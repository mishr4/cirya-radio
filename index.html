<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cirya Player</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0b0b;
            color: #eeeeee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        #player-card {
            width: 350px;
            background: #181818;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            text-align: center;
        }
        #album-art {
            width: 250px;
            height: 250px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 20px;
            background: #252525;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { margin: 10px 0 5px; font-size: 1.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        p { margin: 0 0 25px; color: #a0a0a0; font-size: 1rem; }
        audio { width: 100%; height: 40px; filter: invert(90%); }
        
        #podcast-container {
            margin-top: 25px;
            text-align: left;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 12px; }
        #podcast-list {
            max-height: 180px;
            overflow-y: auto;
        }
        .pod-item {
            display: block;
            padding: 12px;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: 10px;
            margin-bottom: 8px;
            background: #222;
            border: 1px solid transparent;
            transition: background 0.2s;
        }
        .pod-item:hover { 
            background: #2a2a2a; 
            border-color: #444;
        }
        .pod-title { font-weight: 700; display: block; margin-bottom: 2px; }
        .pod-meta { font-size: 0.75rem; color: #777; }
    </style>
</head>
<body>

<div id="player-card">
    <img id="album-art" src="" alt="Art">
    <h2 id="title">Loading Stream...</h2>
    <p id="artist">Cirya Network</p>

    <audio id="audio-player" controls>
        <source src="https://azura.sflx.us/listen/one/radio.mp3" type="audio/mpeg">
    </audio>

    <div id="podcast-container">
        <h3>Recent Podcasts</h3>
        <div id="podcast-list">Syncing episodes...</div>
    </div>
</div>

<script>
    const API_BASE = "https://cast.cirya.co/api";
    const STATION_ID = 1;

    async function fetchMetadata() {
        try {
            const response = await fetch(`${API_BASE}/nowplaying/${STATION_ID}`);
            const data = await response.json();
            
            if (data) {
                document.getElementById('title').innerText = data.now_playing.song.title;
                document.getElementById('artist').innerText = data.now_playing.song.artist;
                document.getElementById('album-art').src = data.now_playing.song.art;
                document.title = "Live: " + data.now_playing.song.title;
            }
        } catch (err) {
            console.error("Metadata sync error:", err);
        }
    }

    async function fetchPodcasts() {
        try {
            const response = await fetch(`${API_BASE}/station/${STATION_ID}/podcasts`);
            const data = await response.json();
            const list = document.getElementById('podcast-list');
            
            if (!data || data.length === 0) {
                list.innerHTML = "<small style='color:#555'>No podcasts published.</small>";
                return;
            }

            list.innerHTML = data.map(pod => `
                <a href="${pod.links.public}" target="_blank" class="pod-item">
                    <span class="pod-title">${pod.title}</span>
                    <span class="pod-meta">${pod.episodes_count || 0} episodes available</span>
                </a>
            `).join('');
        } catch (err) {
            document.getElementById('podcast-list').innerHTML = "<small style='color:#555'>Unable to load podcasts.</small>";
        }
    }

    // Run on boot
    fetchMetadata();
    fetchPodcasts();

    // Poll metadata every 15s to keep current
    setInterval(fetchMetadata, 15000);
</script>

</body>
</html>
